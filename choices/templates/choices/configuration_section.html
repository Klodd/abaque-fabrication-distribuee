{% load static %}

<div class="group bg-slate-800/80 border border-slate-500/20 rounded-lg p-4 transition-all">
  <label class="block text-slate-100 font-bold text-sm uppercase tracking-wide mb-3">{{ g.name }}</label>
  <div class="flex gap-2 items-center">
    <form class="choice-form flex-1" data-group-id="{{ g.id }}" data-group-name="{{ g.name }}" data-default-options="{{ g.options_json|escapejs }}" hx-post="{% url 'choices:update' %}" hx-trigger="change">
      {% csrf_token %}
      <input type="hidden" name="group" value="{{ g.id }}">
      <select name="value" class="w-full bg-slate-700/80 border border-slate-500/20 text-slate-100 px-3 py-2 rounded-md text-sm transition focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200">
        {% for opt in g.options %}
          {% if opt.name %}
            <option value="{{ opt.name }}" {% if forloop.first %}selected{% endif %}
              {% for k,v in opt.items %}{% if k != 'name' %} data-{{ k }}="{{ v }}"{% endif %}{% endfor %}
            >{{ opt.name }}</option>
          {% else %}
            <option value="{{ opt }}" {% if forloop.first %}selected{% endif %}>{{ opt }}</option>
          {% endif %}
        {% endfor %}
      </select>
    </form>
    <button class="edit-options text-slate-400 hover:text-slate-200 transform scale-x-[-1]" data-group-id="{{ g.id }}">✏️</button>
  </div>
  <div id="details-{{ g.id }}" class="choice-details text-sm text-slate-400 mt-3"></div>
</div>
