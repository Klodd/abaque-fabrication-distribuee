{% extends "base_auth.html" %}

{% block title %}Register - Abaque Fabrication{% endblock %}

{% block content %}
    <h1 class="text-2xl font-bold text-center mb-8 text-gray-800">Register</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-5">
            <label for="username" class="block mb-2 text-gray-600 font-medium">Username</label>
            <input type="text" id="username" name="username" required autofocus class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-200">
        </div>
        <div class="mb-5">
            <label for="password" class="block mb-2 text-gray-600 font-medium">Password</label>
            <input type="password" id="password" name="password" required class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-200">
        </div>
        <div class="mb-6">
            <label for="password_confirm" class="block mb-2 text-gray-600 font-medium">Confirm Password</label>
            <input type="password" id="password_confirm" name="password_confirm" required class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-200">
        </div>
        <button type="submit" class="w-full p-3 bg-indigo-500 text-white font-semibold rounded-md hover:bg-purple-600 transition-colors">Register</button>
    </form>
    <div class="text-center mt-6 text-gray-600">
        Already have an account? <a href="/login/" class="text-indigo-500 font-semibold hover:underline">Login here</a>
    </div>
{% endblock %}
