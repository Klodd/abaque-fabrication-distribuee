{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Abaque Fabrication{% endblock %}</title>
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>
<body class="font-sans min-h-screen bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
    <div class="bg-white p-10 rounded-lg shadow-xl w-full max-w-md">
        {% if error %}
            <div class="bg-yellow-50 text-red-600 p-3 rounded-md mb-5 border-l-4 border-red-500">{{ error }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
